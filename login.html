<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - LuxStay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-navy">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-hotel"></i> LuxStay</a>
        </div>
    </nav>

    <section class="login-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="auth-card">
                        <div id="loginForm" class="auth-form">
                            <h3 class="text-center mb-4">Đăng Nhập</h3>
                            <form id="loginFormSubmit">
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" id="loginEmail" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Mật khẩu</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="loginPassword" required>
                                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('loginPassword')">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">Ghi nhớ đăng nhập</label>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
                            </form>
                            <hr>
                            <p class="text-center">
                                Chưa có tài khoản? <a href="#" onclick="toggleAuthForm('register')">Đăng ký ngay</a>
                            </p>
                            <p class="text-center">
                                <a href="#" onclick="showAdminLogin()">Đăng nhập Admin</a>
                            </p>
                        </div>

                        <div id="registerForm" class="auth-form" style="display:none;">
                            <h3 class="text-center mb-4">Đăng Ký</h3>
                            <form id="registerFormSubmit">
                                <div class="mb-3">
                                    <label class="form-label">Họ và tên</label>
                                    <input type="text" class="form-control" id="regName" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" id="regEmail" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Số điện thoại</label>
                                    <input type="tel" class="form-control" id="regPhone" pattern="[0-9]{10}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Mật khẩu (tối thiểu 6 ký tự)</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="regPassword" minlength="6" required>
                                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('regPassword')">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Xác nhận mật khẩu</label>
                                    <input type="password" class="form-control" id="regConfirmPassword" required>
                                    <div class="invalid-feedback">Mật khẩu không khớp</div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Đăng ký</button>
                            </form>
                            <hr>
                            <p class="text-center">
                                Đã có tài khoản? <a href="#" onclick="toggleAuthForm('login')">Đăng nhập</a>
                            </p>
                        </div>

                        <div id="adminLoginForm" class="auth-form" style="display:none;">
                            <h3 class="text-center mb-4">Đăng Nhập Admin</h3>
                            <form id="adminLoginFormSubmit">
                                <div class="mb-3">
                                    <label class="form-label">Username</label>
                                    <input type="text" class="form-control" id="adminUsername" value="admin" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="adminPassword" value="admin123" required>
                                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('adminPassword')">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Đăng nhập Admin</button>
                            </form>
                            <hr>
                            <p class="text-center">
                                <a href="#" onclick="toggleAuthForm('login')">Đăng nhập người dùng</a>
                            </p>
                            <div class="alert alert-info mt-3">
                                <small><strong>Demo:</strong> admin / admin123</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
